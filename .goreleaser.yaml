# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: contaigen

builds:
  - id: contaigen
    main: ./cmd/contaigen
    binary: contaigen
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: contaigen
    ids:
      - contaigen
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - CHANGELOG.md
      - CONTRIBUTING.md
      - LICENSE
      - README.md
      - SECURITY.md
      - docs/integration-tests.md
      - docs/licensing.md
      - docs/releases.md
      - docs/templates.md
      - docs/usage.md

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: NorthernReach
    name: contaigen
