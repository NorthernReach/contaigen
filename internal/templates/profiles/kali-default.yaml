apiVersion: contaigen.io/v1alpha1
kind: EnvironmentProfile
metadata:
  name: kali-default
  description: Kali rolling workbench using the official minimal Kali Linux image
spec:
  image: kalilinux/kali-rolling
  shell: /bin/bash
  network:
    profile: bridge
  workspace:
    mountPath: /workspace
  pull: true
  start: true
